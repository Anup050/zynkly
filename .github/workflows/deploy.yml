name: Deploy Zynkly to EC2 K3s

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/zynkly-backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/zynkly-frontend:latest

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export KUBECONFIG=/home/ubuntu/.kube/config
            
            # 1. Update Application Deployments
            # Restart deployments to pull the latest images
            kubectl rollout restart deployment/zynkly-backend
            kubectl rollout restart deployment/zynkly-frontend
            
            # Check rollout status
            kubectl rollout status deployment/zynkly-backend
            kubectl rollout status deployment/zynkly-frontend
            
            # 2. Update Monitoring Stack (Assuming the repository is pulled on EC2)
            # Make sure to run `git pull` on your EC2 instance in the project directory before this runs.
            # cd /path/to/your/project
            # helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
            # helm repo update
            # helm upgrade --install monitoring prometheus-community/kube-prometheus-stack -f k8s/monitoring/values.yaml --create-namespace --namespace monitoring

