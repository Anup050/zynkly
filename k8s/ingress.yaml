apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zynkly-ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Ensure large payloads are allowed if needed
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
    # Route /api to backend, everything else to frontend
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  tls:
    - hosts:
        - zynkly.dev
      secretName: zynkly-tls
  rules:
    - host: zynkly.dev
      http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: zynkly-backend-service
                port:
                  number: 80
          - path: /()(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: zynkly-frontend-service
                port:
                  number: 80
