# ServiceMonitor tells Prometheus (via the kube-prometheus-stack operator)
# to scrape the zynkly-backend service for metrics.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: zynkly-backend-monitor
  labels:
    app: zynkly-backend
    release: monitoring  # matches the Helm release name
spec:
  selector:
    matchLabels:
      app: zynkly-backend
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
  namespaceSelector:
    matchNames:
      - default
