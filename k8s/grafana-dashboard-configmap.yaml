apiVersion: v1
kind: ConfigMap
metadata:
  name: zynkly-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  zynkly-dashboard.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "HTTP Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"default\"}[5m])) by (route)",
              "legendFormat": "{{route}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 15,
                "gradientMode": "scheme",
                "showPoints": "auto",
                "pointSize": 5
              },
              "unit": "reqps"
            },
            "overrides": []
          }
        },
        {
          "title": "Request Latency (p95)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{namespace=\"default\"}[5m])) by (le, route))",
              "legendFormat": "p95 {{route}}"
            },
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{namespace=\"default\"}[5m])) by (le, route))",
              "legendFormat": "p50 {{route}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 10
              },
              "unit": "s"
            },
            "overrides": []
          }
        },
        {
          "title": "Error Rate (4xx + 5xx / total)",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{namespace=\"default\", status_code=~\"4..|5..\"}[5m])) / sum(rate(http_requests_total{namespace=\"default\"}[5m])) * 100",
              "legendFormat": "Error %"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "title": "Active Requests",
          "type": "gauge",
          "gridPos": { "h": 5, "w": 6, "x": 6, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(http_active_requests{namespace=\"default\"})",
              "legendFormat": "Active"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "orange", "value": 50 },
                  { "color": "red", "value": 100 }
                ]
              },
              "max": 200
            },
            "overrides": []
          }
        },
        {
          "title": "Total Requests (24h)",
          "type": "stat",
          "gridPos": { "h": 5, "w": 6, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(increase(http_requests_total{namespace=\"default\"}[24h]))",
              "legendFormat": "Total"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "fixedColor": "blue", "mode": "fixed" }
            },
            "overrides": []
          }
        },
        {
          "title": "HTTP Requests by Status Code",
          "type": "piechart",
          "gridPos": { "h": 5, "w": 6, "x": 18, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(increase(http_requests_total{namespace=\"default\"}[1h])) by (status_code)",
              "legendFormat": "{{status_code}}"
            }
          ],
          "fieldConfig": {
            "defaults": {},
            "overrides": []
          }
        },
        {
          "title": "Pod CPU Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 13 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"default\", container!=\"\", container!=\"POD\"}[5m]) * 1000",
              "legendFormat": "{{pod}} / {{container}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 20,
                "gradientMode": "scheme"
              },
              "unit": "millicores"
            },
            "overrides": []
          }
        },
        {
          "title": "Pod Memory Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 13 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"default\", container!=\"\", container!=\"POD\"}",
              "legendFormat": "{{pod}} / {{container}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 20,
                "gradientMode": "scheme"
              },
              "unit": "bytes"
            },
            "overrides": []
          }
        },
        {
          "title": "Node.js Heap Usage",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 21 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "zynkly_nodejs_heap_size_used_bytes{namespace=\"default\"}",
              "legendFormat": "Heap Used"
            },
            {
              "expr": "zynkly_nodejs_heap_size_total_bytes{namespace=\"default\"}",
              "legendFormat": "Heap Total"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "palette-classic" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 15
              },
              "unit": "bytes"
            },
            "overrides": []
          }
        },
        {
          "title": "Node.js Event Loop Lag",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 21 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "zynkly_nodejs_eventloop_lag_seconds{namespace=\"default\"}",
              "legendFormat": "Event Loop Lag"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "color": { "fixedColor": "orange", "mode": "fixed" },
              "custom": {
                "lineWidth": 2,
                "fillOpacity": 20
              },
              "unit": "s"
            },
            "overrides": []
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["zynkly", "backend", "nodejs"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Zynkly Backend Dashboard",
      "uid": "zynkly-backend",
      "version": 1
    }
