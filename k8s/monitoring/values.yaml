# values.yaml for kube-prometheus-stack
# This forces all monitoring components to run on the EC2 instance labeled with role=monitoring

prometheus:
  prometheusSpec:
    nodeSelector:
      role: monitoring

grafana:
  nodeSelector:
    role: monitoring
  # Optional: configure admin password here
  adminPassword: "admin"

alertmanager:
  alertmanagerSpec:
    nodeSelector:
      role: monitoring

kube-state-metrics:
  nodeSelector:
    role: monitoring

prometheus-node-exporter:
  # Note: node-exporter is a DaemonSet and typically runs on ALL nodes to collect metrics.
  # We usually do not restrict it with nodeSelector because we want metrics from both the app and monitoring nodes.
  # But if you ONLY want it on the monitoring node, uncomment the following:
  # nodeSelector:
  #   role: monitoring
